version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "howtis"
    groups:
      patch:
        update-types:
          - "patch"
      minor:
        update-types:
          - "minor"
      major:
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "howtis"
    groups:
      actions:
        patterns:
          - "*"
