plugins {
    id 'io.github.howtis.python-embed'
}

application {
    mainClass = 'io.github.howtis.pythonembed.examples.NumpyBasicExample'
}

dependencies {
    implementation project(':python-embed-runtime')
    implementation 'org.slf4j:slf4j-simple:2.0.16'
}

pythonEmbed {
    packages = ['numpy', 'msgpack']
}
